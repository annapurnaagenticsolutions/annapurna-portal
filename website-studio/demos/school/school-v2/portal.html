<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parent Portal Login | Nexus Academy</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body class="antialiased bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col justify-between">
    <header class="bg-white sticky top-0 z-50 border-b border-gray-100">
      <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="index.html" class="text-2xl font-extrabold tracking-tight text-brand-dark flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-primary to-brand-secondary flex items-center justify-center text-white text-sm">N</div>
          Nexus Academy
        </a>
        <nav class="hidden md:flex space-x-8 font-semibold text-sm text-gray-600">
          <a href="discovery.html" class="hover:text-brand-primary transition">Discovery</a>
          <a href="curriculum.html" class="hover:text-brand-primary transition">Curriculum</a>
          <a href="portal.html" class="text-brand-primary font-bold">Parent Portal</a>
        </nav>
        <a href="index.html" class="bg-gray-100 text-brand-dark px-5 py-2.5 rounded-full text-sm font-semibold hover:bg-gray-200 transition"><i class="fas fa-arrow-left mr-2"></i>Back Home</a>
      </div>
    </header>

    <main class="max-w-md mx-auto my-16 px-6 w-full">
      <div class="bg-white p-8 rounded-3xl border border-gray-200 shadow-xl shadow-brand-primary/5 text-center">
        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-brand-primary to-brand-secondary flex items-center justify-center text-white text-xl mx-auto mb-4"><i class="fas fa-lock"></i></div>
        <h1 class="text-2xl font-extrabold text-brand-dark mb-1">Nexus Connect</h1>
        <p class="text-xs text-gray-500 mb-6">Parent & Student Access Dashboard</p>

        <form onsubmit="event.preventDefault(); alert('Logged into Nexus Portal! Accessing student mastery transcripts and weekly faculty feedback.'); window.location.href='index.html';" class="space-y-4 text-left">
          <div>
            <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-1">Family ID or Email</label>
            <input type="email" required placeholder="parent@family.org" class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-brand-primary" />
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-1">Security PIN / Password</label>
            <input type="password" required placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-brand-primary" />
          </div>
          <button type="submit" class="w-full bg-gradient-to-r from-brand-primary to-brand-secondary text-white py-3.5 rounded-xl font-bold shadow-lg hover:opacity-95 transition">Enter Dashboard &rarr;</button>
        </form>
      </div>
    </main>

    <footer class="bg-brand-dark py-8 text-white/80 text-center text-xs font-light">
      &copy; 2026 Nexus Progressive Charter. <a href="index.html" class="text-brand-primary underline ml-2">Return Home</a>
    </footer>
  </body>
</html>
