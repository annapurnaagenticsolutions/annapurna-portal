<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Class Schedule | NexEdu Dashboard</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      body { background-color: #0A0D14; }
      .panel { background-color: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); }
    </style>
  </head>
  <body class="antialiased text-gray-300 font-sans min-h-screen flex">
    <aside class="w-20 lg:w-64 bg-[#0F131D] border-r border-white/5 flex flex-col justify-between flex-shrink-0">
      <div>
        <div class="h-20 flex items-center justify-center lg:justify-start lg:px-6 border-b border-white/5">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-primary to-brand-secondary flex items-center justify-center text-brand-dark font-bold text-xl">N</div>
          <span class="hidden lg:block ml-3 font-bold text-lg tracking-wide text-white">NexEdu</span>
        </div>
        <nav class="mt-8 space-y-2 px-2 lg:px-4">
          <a href="index.html" class="flex items-center gap-4 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition">
            <i class="fas fa-home text-lg w-6 text-center"></i>
            <span class="hidden lg:block font-medium">Dashboard</span>
          </a>
          <a href="courses.html" class="flex items-center gap-4 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition">
            <i class="fas fa-book-open text-lg w-6 text-center"></i>
            <span class="hidden lg:block font-medium">My Courses</span>
          </a>
          <a href="schedule.html" class="flex items-center gap-4 px-4 py-3 rounded-xl bg-brand-yellow/10 text-brand-yellow font-medium">
            <i class="fas fa-calendar-alt text-lg w-6 text-center"></i>
            <span class="hidden lg:block font-medium">Schedule</span>
          </a>
          <a href="analytics.html" class="flex items-center gap-4 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition">
            <i class="fas fa-chart-line text-lg w-6 text-center"></i>
            <span class="hidden lg:block font-medium">Analytics</span>
          </a>
        </nav>
      </div>
    </aside>

    <main class="flex-grow p-8">
      <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-6">
        <h1 class="text-3xl font-extrabold text-white">Live Classes & Office Hours</h1>
        <a href="index.html" class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-xl text-sm font-semibold transition">&larr; Back to Dashboard</a>
      </div>

      <div class="space-y-4 max-w-4xl">
        <div class="panel p-6 rounded-2xl flex justify-between items-center">
          <div class="flex items-center gap-6">
            <div class="bg-brand-primary/20 text-brand-primary px-4 py-3 rounded-xl font-bold text-center">14:00 EST<br/><span class="text-xs font-normal">Today</span></div>
            <div>
              <h3 class="text-xl font-bold text-white">Data Structures & Graph Algorithms</h3>
              <p class="text-sm text-gray-400">Dr. Harrison • Live Zoom Lecture</p>
            </div>
          </div>
          <button onclick="alert('Joining Zoom Classroom... Please turn on camera for attendance verification.')" class="bg-brand-primary text-brand-dark px-5 py-2.5 rounded-xl font-bold hover:opacity-90 transition">Join Live Room</button>
        </div>

        <div class="panel p-6 rounded-2xl flex justify-between items-center">
          <div class="flex items-center gap-6">
            <div class="bg-yellow-500/20 text-yellow-400 px-4 py-3 rounded-xl font-bold text-center">16:30 EST<br/><span class="text-xs font-normal">Tomorrow</span></div>
            <div>
              <h3 class="text-xl font-bold text-white">UI/UX Design Critique Session</h3>
              <p class="text-sm text-gray-400">Elena Rostova • Interactive Workshop</p>
            </div>
          </div>
          <button onclick="alert('Added reminder for UI/UX Design Critique Session to your calendar!')" class="bg-white/10 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-white/20 transition">Set Reminder</button>
        </div>
      </div>
    </main>
  </body>
</html>
