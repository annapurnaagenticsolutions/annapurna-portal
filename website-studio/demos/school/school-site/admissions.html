<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admissions | Kingston Academy</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-brand-light text-brand-text font-sans antialiased">
    <header class="bg-white shadow-sm sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-20 items-center">
          <a href="index.html" class="font-serif text-2xl font-bold text-brand-primary flex items-center">
            <i class="fas fa-graduation-cap text-brand-accent mr-2 text-3xl"></i>
            Kingston <span class="font-light ml-1 text-gray-500">Academy</span>
          </a>
          <nav class="hidden md:flex space-x-8 items-center font-medium">
            <a href="index.html" class="hover:text-brand-accent transition">Home</a>
            <a href="academics.html" class="hover:text-brand-accent transition">Academics</a>
            <a href="admissions.html" class="text-brand-accent">Admissions</a>
            <a href="campus-life.html" class="hover:text-brand-accent transition">Campus Life</a>
            <a href="contact.html" class="hover:text-brand-accent transition">Contact</a>
            <a href="admissions.html" class="bg-brand-primary hover:bg-brand-secondary text-white px-6 py-2 rounded-sm transition">Apply Now</a>
          </nav>
        </div>
      </div>
    </header>

    <div class="bg-brand-primary py-16 text-white text-center">
      <h1 class="text-4xl md:text-5xl font-serif font-bold mb-4">Admissions & Tuition</h1>
      <p class="text-lg text-gray-300 max-w-2xl mx-auto">We welcome students of all backgrounds who demonstrate a passion for learning and character.</p>
    </div>

    <section class="max-w-4xl mx-auto px-4 py-16">
      <div class="bg-white p-8 rounded shadow-lg">
        <h2 class="text-3xl font-serif font-bold text-brand-primary mb-6 text-center">Start Your Application</h2>
        <form onSubmit="event.preventDefault(); alert('Your application inquiry has been submitted! Our admissions team will email you the formal packet.');" class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Student Full Name</label>
              <input type="text" required placeholder="Student Name" class="w-full border border-gray-300 p-3 rounded focus:border-brand-primary outline-none" />
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Date of Birth</label>
              <input type="date" required class="w-full border border-gray-300 p-3 rounded focus:border-brand-primary outline-none" />
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Parent/Guardian Name</label>
              <input type="text" required placeholder="Parent Name" class="w-full border border-gray-300 p-3 rounded focus:border-brand-primary outline-none" />
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Parent Email Address</label>
              <input type="email" required placeholder="email@domain.com" class="w-full border border-gray-300 p-3 rounded focus:border-brand-primary outline-none" />
            </div>
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Applying for Academic Year</label>
            <select class="w-full border border-gray-300 p-3 rounded focus:border-brand-primary outline-none">
              <option>Fall 2026 - Kindergarten</option>
              <option>Fall 2026 - Elementary (Grades 1-5)</option>
              <option>Fall 2026 - Middle School (Grades 6-8)</option>
              <option>Fall 2026 - High School (Grades 9-12)</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Additional Comments / Questions</label>
            <textarea rows="3" placeholder="Tell us about your student's interests..." class="w-full border border-gray-300 p-3 rounded focus:border-brand-primary outline-none"></textarea>
          </div>
          <button type="submit" class="w-full bg-brand-accent hover:bg-brand-accent-hover text-white font-bold py-4 rounded text-lg transition shadow-md">Submit Formal Inquiry &rarr;</button>
        </form>
      </div>
    </section>

    <footer class="bg-[#112543] text-gray-300 py-12 text-center text-sm">
      <p>&copy; 2026 Kingston Academy. All rights reserved. <a href="index.html" class="text-brand-accent underline">Return Home</a></p>
    </footer>
  </body>
</html>
