<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body class="antialiased font-sans text-brand-primary bg-brand-light">
    <header class="bg-white sticky top-0 z-50 border-b border-gray-200">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-24">
          <nav class="hidden md:flex space-x-10 text-sm tracking-widest uppercase">
            <a href="collections.html" class="text-brand-accent font-bold">Collections</a>
            <a href="high-jewellery.html" class="hover:text-brand-accent transition">High Jewellery</a>
          </nav>
          <a href="index.html" class="font-serif text-3xl tracking-[0.2em] uppercase text-center flex-grow md:flex-grow-0">A U R A</a>
          <nav class="hidden md:flex space-x-8 items-center text-sm tracking-widest uppercase">
            <a href="maison.html" class="hover:text-brand-accent transition">Maison</a>
            <a href="index.html" class="border border-brand-primary px-6 py-2 hover:bg-brand-primary hover:text-white transition">Bespoke</a>
          </nav>
        </div>
      </div>
    </header>

    <div class="bg-brand-primary py-24 text-center text-white">
      <span class="text-xs uppercase tracking-[0.4em] text-brand-accent mb-2 block">Iconic Creations</span>
      <h1 class="font-serif text-5xl tracking-wide">The Signature Collections</h1>
    </div>

    <section class="max-w-7xl mx-auto px-4 py-16 grid grid-cols-1 md:grid-cols-3 gap-8">
      <div class="bg-white p-6 border border-gray-200 text-center">
        <img src="assets/images/ring1.jpg" alt="Lumière" class="w-full aspect-square object-cover mb-4" />
        <h3 class="font-serif text-2xl mb-1">Lumière d'Or</h3>
        <p class="text-xs text-gray-500 uppercase tracking-widest mb-3">18k Rose Gold & Diamonds</p>
        <span class="font-serif text-lg text-brand-accent font-bold">$12,400</span>
      </div>
      <div class="bg-white p-6 border border-gray-200 text-center">
        <img src="assets/images/ring2.jpg" alt="Étoile" class="w-full aspect-square object-cover mb-4" />
        <h3 class="font-serif text-2xl mb-1">Étoile Nocturne</h3>
        <p class="text-xs text-gray-500 uppercase tracking-widest mb-3">Platinum & Sapphire</p>
        <span class="font-serif text-lg text-brand-accent font-bold">$18,900</span>
      </div>
      <div class="bg-white p-6 border border-gray-200 text-center">
        <img src="assets/images/ring3.jpg" alt="Impériale" class="w-full aspect-square object-cover mb-4" />
        <h3 class="font-serif text-2xl mb-1">Couronne Impériale</h3>
        <p class="text-xs text-gray-500 uppercase tracking-widest mb-3">Yellow Gold & Emeralds</p>
        <span class="font-serif text-lg text-brand-accent font-bold">$24,500</span>
      </div>
    </section>

    <footer class="bg-brand-primary py-12 text-center text-gray-400 text-xs tracking-widest uppercase">
      &copy; 2026 A U R A Joaillerie. <a href="index.html" class="text-brand-accent underline ml-2">Return Home</a>
    </footer>
