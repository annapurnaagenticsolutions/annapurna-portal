<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Sign In | Global Campus</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body class="antialiased bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col justify-between">
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg bg-brand-primary flex items-center justify-center text-white font-bold"><i class="fas fa-globe"></i></div>
          <span class="font-bold text-xl tracking-tight">Global Campus</span>
        </a>
        <div class="hidden md:flex items-center gap-8 font-medium text-sm text-gray-600">
          <a href="programs.html" class="hover:text-brand-primary transition">Programs</a>
          <a href="tuition.html" class="hover:text-brand-primary transition">Tuition & Financial Aid</a>
          <a href="admissions.html" class="hover:text-brand-primary transition">Admissions</a>
          <div class="h-6 w-px bg-gray-300"></div>
          <a href="signin.html" class="text-brand-primary font-bold">Sign In</a>
          <a href="index.html" class="bg-gray-100 text-gray-800 px-4 py-2 rounded-lg hover:bg-gray-200 transition">&larr; Back</a>
        </div>
      </div>
    </nav>

    <main class="max-w-md mx-auto my-16 px-6 w-full">
      <div class="bg-white p-8 rounded-3xl border border-gray-200 shadow-xl shadow-brand-primary/5 text-center">
        <div class="w-12 h-12 rounded-xl bg-brand-primary flex items-center justify-center text-white text-xl mx-auto mb-4"><i class="fas fa-user-lock"></i></div>
        <h1 class="text-2xl font-extrabold text-gray-900 mb-1">Student & Faculty Portal</h1>
        <p class="text-xs text-gray-500 mb-6">Single Sign-On (SSO) Access</p>

        <form onsubmit="event.preventDefault(); alert('Logged into Global Campus LMS! Loading active courses, assignment deadlines, and student email.'); window.location.href='index.html';" class="space-y-4 text-left">
          <div>
            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Campus ID or Email</label>
            <input type="email" required placeholder="student@globalcampus.edu" class="w-full px-4 py-3 rounded-xl border border-gray-300 text-sm focus:outline-none focus:border-brand-primary" />
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Password</label>
            <input type="password" required placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-300 text-sm focus:outline-none focus:border-brand-primary" />
          </div>
          <button type="submit" class="w-full bg-brand-primary text-white py-3.5 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition">Sign In to LMS &rarr;</button>
        </form>
      </div>
    </main>

    <footer class="bg-brand-dark text-white py-8 border-t-4 border-brand-primary text-center text-xs">
      &copy; 2026 Global Campus Online University. <a href="index.html" class="text-brand-primary underline ml-2">Return Home</a>
    </footer>
  </body>
</html>
