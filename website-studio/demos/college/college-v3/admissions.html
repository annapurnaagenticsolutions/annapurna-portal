<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admissions Application | Global Campus</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body class="antialiased bg-gray-50 text-gray-800 font-sans">
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg bg-brand-primary flex items-center justify-center text-white font-bold"><i class="fas fa-globe"></i></div>
          <span class="font-bold text-xl tracking-tight">Global Campus</span>
        </a>
        <div class="hidden md:flex items-center gap-8 font-medium text-sm text-gray-600">
          <a href="programs.html" class="hover:text-brand-primary transition">Programs</a>
          <a href="tuition.html" class="hover:text-brand-primary transition">Tuition & Financial Aid</a>
          <a href="admissions.html" class="text-brand-primary font-bold">Admissions</a>
          <div class="h-6 w-px bg-gray-300"></div>
          <a href="signin.html" class="hover:text-brand-primary transition">Sign In</a>
          <a href="index.html" class="bg-gray-100 text-gray-800 px-4 py-2 rounded-lg hover:bg-gray-200 transition">&larr; Back</a>
        </div>
      </div>
    </nav>

    <main class="max-w-2xl mx-auto my-16 px-6">
      <div class="bg-white p-8 md:p-10 rounded-3xl border border-gray-200 shadow-xl shadow-brand-primary/5">
        <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Fast-Track Online Application</h1>
        <p class="text-sm text-gray-500 mb-8">No application fee required. Completed within 10 minutes.</p>

        <form onsubmit="event.preventDefault(); alert('Online Application submitted to Global Campus Admissions! An enrollment counselor will review your transcripts.'); window.location.href='index.html';" class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold text-gray-700 uppercase mb-1">First Name</label>
              <input type="text" required placeholder="Alex" class="w-full px-4 py-3 rounded-xl border border-gray-300 text-sm focus:outline-none focus:border-brand-primary" />
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Last Name</label>
              <input type="text" required placeholder="Chen" class="w-full px-4 py-3 rounded-xl border border-gray-300 text-sm focus:outline-none focus:border-brand-primary" />
            </div>
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Email Address</label>
            <input type="email" required placeholder="alex@domain.com" class="w-full px-4 py-3 rounded-xl border border-gray-300 text-sm focus:outline-none focus:border-brand-primary" />
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Intended Degree Program</label>
            <select class="w-full px-4 py-3 rounded-xl border border-gray-300 text-sm focus:outline-none focus:border-brand-primary">
              <option>M.S. in Applied Artificial Intelligence</option>
              <option>B.S. in Cybersecurity & Network Defense</option>
              <option>Executive MBA in Innovation Leadership</option>
            </select>
          </div>
          <button type="submit" class="w-full bg-brand-primary text-white py-4 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition">Complete Application &rarr;</button>
        </form>
      </div>
    </main>

    <footer class="bg-brand-dark text-white py-12 border-t-4 border-brand-primary text-center text-sm">
      &copy; 2026 Global Campus Online University. <a href="index.html" class="text-brand-primary underline ml-2">Return Home</a>
    </footer>
  </body>
</html>
